<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Qantara Status</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07080d;
        --panel: #10131d;
        --border: #273044;
        --text: #f5f7fb;
        --muted: #9aa4b8;
        --ok: #45d483;
        --warn: #f6c85f;
        --bad: #ff6b6b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(920px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }
      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 28px;
      }
      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 48px);
        letter-spacing: 0;
        line-height: 1.05;
      }
      p { margin: 0; color: var(--muted); }
      code {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 2px 6px;
        background: #070a12;
        color: var(--text);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 38px;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 8px 14px;
        background: var(--panel);
        font-weight: 700;
        white-space: nowrap;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--warn);
      }
      .ok .dot { background: var(--ok); }
      .bad .dot { background: var(--bad); }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }
      .card {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel);
        padding: 18px;
      }
      .label {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .value {
        min-height: 28px;
        overflow-wrap: anywhere;
        font-size: 20px;
        font-weight: 800;
      }
      .ok-text { color: var(--ok); }
      .warn-text { color: var(--warn); }
      .bad-text { color: var(--bad); }
      .section {
        margin-top: 18px;
      }
      .events {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }
      .event {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        border-top: 1px solid var(--border);
        padding-top: 10px;
        color: var(--muted);
      }
      button {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #171c29;
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        padding: 10px 14px;
      }
      button:focus-visible {
        outline: 2px solid var(--ok);
        outline-offset: 2px;
      }
      @media (max-width: 760px) {
        header { display: grid; }
        .grid { grid-template-columns: 1fr 1fr; }
      }
      @media (max-width: 460px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Qantara Status</h1>
          <p>Live status from <code id="api-url"></code></p>
        </div>
        <div aria-live="polite" id="overall" class="badge">
          <span class="dot" aria-hidden="true"></span>
          <span>Checking</span>
        </div>
      </header>

      <section class="grid" aria-label="Service health">
        <article class="card">
          <div class="label">Backend</div>
          <div id="backend" class="value warn-text">Checking</div>
        </article>
        <article class="card">
          <div class="label">Readiness</div>
          <div id="ready" class="value warn-text">Checking</div>
        </article>
        <article class="card">
          <div class="label">Database</div>
          <div id="db" class="value warn-text">Checking</div>
        </article>
        <article class="card">
          <div class="label">QIE RPC</div>
          <div id="rpc" class="value warn-text">Checking</div>
        </article>
      </section>

      <section class="card section">
        <div class="label">Operations</div>
        <div class="events" id="events" aria-live="polite"></div>
      </section>

      <section class="section">
        <button type="button" id="refresh">Refresh</button>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const apiBase = (params.get('api') || window.location.origin).replace(/\/$/, '');
      const fields = {
        apiUrl: document.getElementById('api-url'),
        overall: document.getElementById('overall'),
        backend: document.getElementById('backend'),
        ready: document.getElementById('ready'),
        db: document.getElementById('db'),
        rpc: document.getElementById('rpc'),
        events: document.getElementById('events'),
        refresh: document.getElementById('refresh'),
      };
      fields.apiUrl.textContent = apiBase;

      function setValue(el, text, state) {
        el.textContent = text;
        el.classList.remove('ok-text', 'warn-text', 'bad-text');
        el.classList.add(state === 'ok' ? 'ok-text' : state === 'bad' ? 'bad-text' : 'warn-text');
      }

      function addEvent(label, value) {
        const row = document.createElement('div');
        row.className = 'event';
        const left = document.createElement('span');
        const right = document.createElement('strong');
        left.textContent = label;
        right.textContent = value;
        row.append(left, right);
        fields.events.append(row);
      }

      function setOverall(state, text) {
        fields.overall.classList.remove('ok', 'bad');
        if (state === 'ok') fields.overall.classList.add('ok');
        if (state === 'bad') fields.overall.classList.add('bad');
        fields.overall.querySelector('span:last-child').textContent = text;
      }

      async function getJson(path) {
        const response = await fetch(`${apiBase}${path}`, { cache: 'no-store' });
        const text = await response.text();
        let body = {};
        try { body = text ? JSON.parse(text) : {}; } catch {}
        return { ok: response.ok, status: response.status, body };
      }

      async function refresh() {
        fields.events.replaceChildren();
        setOverall('warn', 'Checking');
        setValue(fields.backend, 'Checking', 'warn');
        setValue(fields.ready, 'Checking', 'warn');
        setValue(fields.db, 'Checking', 'warn');
        setValue(fields.rpc, 'Checking', 'warn');

        try {
          const [health, ready] = await Promise.allSettled([getJson('/v1/health'), getJson('/v1/ready')]);
          const healthResult = health.status === 'fulfilled' ? health.value : null;
          const readyResult = ready.status === 'fulfilled' ? ready.value : null;
          const healthBody = healthResult?.body || {};

          setValue(fields.backend, healthResult?.ok ? 'Online' : `HTTP ${healthResult?.status || 'error'}`, healthResult?.ok ? 'ok' : 'bad');
          setValue(fields.ready, readyResult?.ok ? 'Ready' : `HTTP ${readyResult?.status || 'error'}`, readyResult?.ok ? 'ok' : 'bad');
          setValue(fields.db, healthBody.db === 'ok' || healthBody.db?.ok ? 'OK' : String(healthBody.db || 'Unknown'), healthBody.db === 'ok' || healthBody.db?.ok ? 'ok' : 'warn');
          setValue(fields.rpc, healthBody.rpc === 'ok' || healthBody.rpc?.ok ? 'OK' : String(healthBody.rpc || 'Unknown'), healthBody.rpc === 'ok' || healthBody.rpc?.ok ? 'ok' : 'warn');

          addEvent('Last checked', new Date().toLocaleString());
          addEvent('Health endpoint', healthResult ? `${healthResult.status}` : 'request failed');
          addEvent('Ready endpoint', readyResult ? `${readyResult.status}` : 'request failed');
          if (healthBody.version) addEvent('Backend version', String(healthBody.version));
          if (healthBody.indexer) addEvent('Indexer', JSON.stringify(healthBody.indexer));

          if (healthResult?.ok && readyResult?.ok) setOverall('ok', 'Operational');
          else setOverall('bad', 'Degraded');
        } catch (error) {
          setOverall('bad', 'Unavailable');
          setValue(fields.backend, 'Unavailable', 'bad');
          addEvent('Error', error instanceof Error ? error.message : String(error));
        }
      }

      fields.refresh.addEventListener('click', refresh);
      refresh();
    </script>
  </body>
</html>
