name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  sdk-npm:
    name: Publish SDK to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/qantara-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci || npm install
      - run: npm test
      - name: Publish (skips cleanly without NPM_TOKEN)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN not set — skipping publish (publish-ready, not wired)."
            exit 0
          fi
          npm publish --provenance --access public

  images:
    name: Build + push image (GHCR)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: backend
          - service: frontend
            context: qie-app
          - service: tg-bot
            context: tg-bot
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.event.release.tag_name || github.sha }}
          sbom: true
          provenance: true
      - name: Scan pushed image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          ignore-unfixed: true
          severity: CRITICAL
          exit-code: "1"
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/${{ github.repository }}/${{ matrix.service }}@${DIGEST}"
